<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID's Generator for website</title>
   <link rel="stylesheet" href="style.css">
   <script src="https://cdn.tailwindcss.com"></script>
   
</head>

<body class="bg-gradient-to-br from-red-800 to-blue-400 flex items-center justify-center min-h-screen w-full">


<main class="bg-gray-900 flex flex-col justify-start p-4 w-full rounded-lg max-w-[350px] text-center text-red-400">
   <h1 class="text-3xl">Auto ID's Generator</h1>
   <section class="flex flex-col mx-10 text-white">
      <input type="text" id="email" class="w-full rounded max-w-[100%] bg-gray-700 mt-10 p-1" readonly placeholder="Your Email will Generate Here...">
       <input type="text" id="pass" class="w-full rounded max-w-[120%] bg-gray-700 mt-5 p-1" readonly placeholder="Your Pass will Generate Here...">
 </section>  

  <button onclick="change()" class="text-white bg-red-700 px-2 p-1 rounded w-24 mx-[33%] mt-5">Generate</button>
        
</main>


</body>

<script src="script.js"></script>
</body>
</html>
